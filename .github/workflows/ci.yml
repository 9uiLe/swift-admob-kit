name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: >-
          xcodebuild test
          -scheme SwiftAdsKit
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest'
