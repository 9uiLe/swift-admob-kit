name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Resolve package
        run: swift package resolve
      - name: Test
        run: >-
          xcodebuild test
          -scheme SwiftAdMobKit
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest'
